spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: resource-service
              uri: lb://resource-service
              predicates:
                - Path=/resources/**
            - id: song-service
              uri: lb://song-service
              predicates:
                - Path=/songs/**
server:
  port: 8080
eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka}"
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: "${GATEWAY_SERVER_HOSTNAME:localhost}"
management:
  endpoint:
    health:
      probes:
        enabled: true
logging:
  level:
    com.epam.learn.gs: info
    org.springframework: info
    com.netflix.eureka: off
    com.netflix.discovery: off