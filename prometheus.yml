global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway-server
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names:
          - gateway-server
        type: A
        port: 8080
        refresh_interval: 15s
  - job_name: resource-service
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names:
          - resource-service
        type: A
        port: 8081
        refresh_interval: 15s
  - job_name: song-service
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names:
          - song-service
        type: A
        port: 8082
        refresh_interval: 15s
  - job_name: storage-service
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names:
          - storage-service
        type: A
        port: 8084
        refresh_interval: 15s
  - job_name: resource-processor
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names:
          - resource-processor
        type: A
        port: 8085
        refresh_interval: 15s