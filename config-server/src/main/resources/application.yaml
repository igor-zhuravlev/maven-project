spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: "${CONFIG_REPO_URI}"
          default-label: "${CONFIG_REPO_BRANCH:master}"
          clone-on-start: true
          force-pull: true
          delete-untracked-branches: true
server:
  port: 8888
eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka}"
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: "${spring.application.name}"
logging:
  file:
    name: "${LOG_FILE:logs/config-server.log}"
  structured:
    format:
      file: ecs