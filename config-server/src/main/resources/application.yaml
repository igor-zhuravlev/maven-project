spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: "${CONFIG_REPO_URI}"
          default-label: "${CONFIG_REPO_BRANCH:master}"
          clone-on-start: true
          force-pull: true
          delete-untracked-branches: true
server:
  port: 8888
eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_SERVER_URL:http://localhost:8761/eureka}"
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
management:
  endpoint:
    health:
      probes:
        enabled: true
logging:
  level:
    com.epam.learn.cs: info
    org.springframework: info
    com.netflix.eureka: off
    com.netflix.discovery: off