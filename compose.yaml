services:

  resource-db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${RESOURCE_DB_NAME}
      POSTGRES_USER: ${RESOURCE_DB_USER}
      POSTGRES_PASSWORD: ${RESOURCE_DB_PASSWORD}
    volumes:
      - ./init-scripts/resource-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  song-db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${SONG_DB_NAME}
      POSTGRES_USER: ${SONG_DB_USER}
      POSTGRES_PASSWORD: ${SONG_DB_PASSWORD}
    volumes:
      - ./init-scripts/song-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  storage-db:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${STORAGE_DB_NAME}
      POSTGRES_USER: ${STORAGE_DB_USER}
      POSTGRES_PASSWORD: ${STORAGE_DB_PASSWORD}
    volumes:
      - ./init-scripts/storage-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  resource-service:
    build: ./resource-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: ${RESOURCE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${RESOURCE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${RESOURCE_DB_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      SONG_SERVICE_URL: ${SONG_SERVICE_URL}
      STORAGE_SERVICE_URL: ${STORAGE_SERVICE_URL}
      RABBITMQ_HOSTNAME: ${RABBITMQ_HOSTNAME}
      LOCALSTACK_ENDPOINT: ${LOCALSTACK_ENDPOINT}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      config-server:
        condition: service_healthy
      resource-db:
        condition: service_healthy
      localstack:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      song-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health/readiness"]
      interval: 5s
      timeout: 2s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  song-service:
    build: ./song-service
    ports:
      - "8082-8083:8082"
    deploy:
      replicas: 2
    environment:
      SPRING_DATASOURCE_URL: ${SONG_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SONG_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SONG_DB_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      config-server:
        condition: service_healthy
      song-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health/readiness"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  storage-service:
    build: ./storage-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: ${STORAGE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${STORAGE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${STORAGE_DB_PASSWORD}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      config-server:
        condition: service_healthy
      storage-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/actuator/health/readiness"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  resource-processor:
    build: ./resource-processor
    ports:
      - "8085:8085"
    environment:
      RESOURCE_SERVICE_URL: ${RESOURCE_SERVICE_URL}
      SONG_SERVICE_URL: ${SONG_SERVICE_URL}
      RABBITMQ_HOSTNAME: ${RABBITMQ_HOSTNAME}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      resource-service:
        condition: service_healthy
      song-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/actuator/health/readiness"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  config-server:
    build: ./config-server
    ports:
      - "8888:8888"
    environment:
      CONFIG_REPO_URI: ${CONFIG_REPO_URI}
      CONFIG_REPO_BRANCH: ${CONFIG_REPO_BRANCH}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health/readiness"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health/readiness"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  gateway-server:
    build: ./gateway-server
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      GATEWAY_SERVER_HOSTNAME: ${GATEWAY_SERVER_HOSTNAME}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health/readiness"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
    volumes:
      - ./init-scripts/localstack:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 2s
      retries: 15
      start_period: 10s
    restart: unless-stopped